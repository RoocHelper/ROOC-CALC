                const hp = hpStr === '???' ? '???' : (parseInt(hpStr) || 0);
                
                const def = parseInt(cols[7]) || 0;
                const mdef = parseInt(cols[10]) || 0;

                monsterDB.push({
                    id: (name + '_' + lv).toLowerCase().replace(/[^a-z0-9]/g, '_'),
                    name: `${name} (Lv.${lv})${isBoss ? ' 👑' : ''}`,
                    def, mdef, hp, size, race, element, isBoss
                });
            }
        }

        function ROOCCalculator() {
            const [mode, setMode] = useState('PvE');
            const [dmgType, setDmgType] = useState('Physical');
            const [isAutoAttack, setIsAutoAttack] = useState(false);
            const [isMapOpen, setIsMapOpen] = useState(false);
            const [selectedMonsterId, setSelectedMonsterId] = useState('custom');

            useEffect(() => {
                if (isMapOpen) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = 'unset';
                }
                return () => { document.body.style.overflow = 'unset'; };
            }, [isMapOpen]);

            const [stats, setStats] = useState({
                atk: 6334, refineAtk: 639, pdmg: 83.09, pen: 0, critRate: 50, critDmg: 20, dmgToEle: 0, 
                eleDmg: 0, sizeDmg: 20, raceDmg: 5, mvpDmg: 0, eleWeakness: 100, 
                pveDmg: 683, pvpBonus: 500, aspd: 500
            });

            const [skill, setSkill] = useState({
                multiplier: 710, flat: 540, castTime: 0, cooldown: 0.5, globalCd: 1.0, gcdReduc: 12
            });

            const [target, setTarget] = useState({
                id: 'custom', def: 500, ignoreFlat: 971, ignorePercent: 0, pvpReduc: 200, isBoss: false
            });

            const [results, setResults] = useState({
                sisaDef: 0, penMult: 1, pvpDiff: 0, pvpMult: 1, 
                damageNormal: 0, damageCrit: 0, expectedHitDmg: 0,
                expectedHitMin: 0, expectedHitMax: 0,
                delay: 0, hps: 0, 
                dpsNormal: 0, dpsCrit: 0, expectedDps: 0,
                expectedDpsMin: 0, expectedDpsMax: 0
            });

            const handleChange = (setter) => (e) => {
                const { name, value } = e.target;
                setter(prev => ({ ...prev, [name]: parseFloat(value) || 0 }));
            };

            const handleTargetChange = (e) => {
                const { name, value } = e.target;
                setTarget(prev => ({ ...prev, [name]: parseFloat(value) || 0 }));
                if (name === 'def') setSelectedMonsterId('custom');
            };

            const handleMonsterChange = (e) => {
                const mId = e.target.value;
                setSelectedMonsterId(mId);
                if (mId !== 'custom') {
                    const mon = monsterDB.find(m => m.id === mId);
                    if (mon) {
                        setTarget(prev => ({ 
                            ...prev, 
                            id: mon.id,
                            def: dmgType === 'Physical' ? mon.def : mon.mdef,
                            isBoss: mon.isBoss 
                        }));
                    }
                } else {
                    setTarget(prev => ({ ...prev, id: 'custom', isBoss: false }));
                }
            };

            const handleModeChange = (newMode) => {
                setMode(newMode);
                if (newMode === 'PvP') {
                    setStats(prev => ({ ...prev, raceDmg: 5, sizeDmg: 20, eleWeakness: 100, mvpDmg: 0 }));
                }
            };

            const handleDmgTypeChange = (newType) => {
                setDmgType(newType);
                if (selectedMonsterId !== 'custom') {
                    const mon = monsterDB.find(m => m.id === selectedMonsterId);
                    if (mon) {
                        setTarget(prev => ({ ...prev, def: newType === 'Physical' ? mon.def : mon.mdef }));
                    }
                }
            };

            useEffect(() => {
                if (typeof window.hitungDamageROOC === 'function') {
                    const hasil = window.hitungDamageROOC(stats, skill, target, mode, isAutoAttack);
                    setResults(hasil);
                }
            }, [stats, skill, target, mode, isAutoAttack]);

            const fmt = (num) => Math.round(num || 0).toLocaleString('id-ID');
            const fmtDec = (num) => (num || 0).toFixed(2);

            return (
                <div className="max-w-5xl mx-auto p-4 sm:p-6 lg:p-8 pb-24 lg:pb-8">
                    
                    {/* ======================= */}
                    {/* HEADER & MENU TOGGLES   */}
                    {/* ======================= */}
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 bg-slate-900/80 p-5 rounded-2xl border border-slate-700/50 backdrop-blur-md shadow-2xl">
                        <div className="flex items-center gap-4">
                            <div className="text-4xl drop-shadow-[0_0_15px_rgba(251,191,36,0.5)]">✨</div>
                            <div>
                                <h1 className="text-2xl sm:text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-amber-200 via-amber-400 to-yellow-600 tracking-wide">
                                    ROOC SIMULATOR
                                </h1>
                                <p className="text-indigo-300 font-medium text-xs sm:text-sm mt-0.5 tracking-wider uppercase">Theorycrafting Dashboard</p>
                            </div>
                        </div>
                        
                        <div className="flex flex-wrap items-center justify-center gap-2">
                            <div className="flex bg-slate-950/80 p-1.5 rounded-xl border border-slate-700/50 shadow-inner">
                                <button onClick={() => handleDmgTypeChange('Physical')} className={`flex items-center gap-2 px-3 py-1.5 mr-1 rounded-lg font-bold text-sm transition-all duration-300 ${dmgType === 'Physical' ? 'bg-gradient-to-r from-amber-600 to-orange-700 text-white shadow-[0_0_10px_rgba(217,119,6,0.5)]' : 'text-slate-400 hover:text-amber-300 hover:bg-slate-800'}`}>
                                    ⚔️ Physical
                                </button>
                                <button onClick={() => handleDmgTypeChange('Magic')} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg font-bold text-sm transition-all duration-300 ${dmgType === 'Magic' ? 'bg-gradient-to-r from-purple-600 to-fuchsia-700 text-white shadow-[0_0_10px_rgba(147,51,234,0.5)]' : 'text-slate-400 hover:text-purple-300 hover:bg-slate-800'}`}>
                                    🪄 Magic
                                </button>
                            </div>

                            <div className="flex bg-slate-950/80 p-1.5 rounded-xl border border-slate-700/50 shadow-inner">
                                <button onClick={() => setIsMapOpen(true)} className="flex items-center gap-2 px-3 py-1.5 mr-1 rounded-lg font-bold text-sm transition-all duration-300 bg-slate-800 border border-slate-600 text-amber-400 hover:bg-slate-700 hover:text-amber-300">
                                    🗺️ Map
                                </button>
                                <button onClick={() => handleModeChange('PvE')} className={`flex items-center gap-2 px-3 py-1.5 mr-1 rounded-lg font-bold text-sm transition-all duration-300 ${mode === 'PvE' ? 'bg-gradient-to-r from-indigo-600 to-blue-700 text-white shadow-[0_0_10px_rgba(99,102,241,0.5)]' : 'text-slate-400 hover:text-indigo-300 hover:bg-slate-800'}`}>
                                    🎯 PvE
                                </button>
                                <button onClick={() => handleModeChange('PvP')} className={`flex items-center gap-2 px-3 py-1.5 rounded-lg font-bold text-sm transition-all duration-300 ${mode === 'PvP' ? 'bg-gradient-to-r from-rose-600 to-red-700 text-white shadow-[0_0_10px_rgba(225,29,72,0.5)]' : 'text-slate-400 hover:text-rose-300 hover:bg-slate-800'}`}>
                                    ⚔️ PvP
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* ======================================= */}
                    {/* DASHBOARD ESTIMASI OUTPUT (TOP LEVEL)   */}
                    {/* ======================================= */}
                    <div className="mb-8 bg-slate-900/90 backdrop-blur-xl rounded-3xl border border-slate-600/50 p-5 sm:p-6 shadow-[0_15px_50px_-15px_rgba(0,0,0,0.6)] relative overflow-hidden">
                        <div className="absolute top-[-50%] left-[-10%] w-[50%] h-[200%] bg-amber-500/5 blur-[100px] pointer-events-none"></div>
                        <div className="absolute top-[-50%] right-[-10%] w-[50%] h-[200%] bg-emerald-500/5 blur-[100px] pointer-events-none"></div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 relative z-10">
                            
                            {/* KIRI: HIT DAMAGE & DPS (Memanjang 2 Kolom) */}
                            <div className="lg:col-span-2 flex flex-col gap-6">
                                
                                {/* KARTU 1: DAMAGE PER HIT */}
                                <div className="bg-slate-950/60 rounded-2xl p-5 sm:p-6 border border-amber-500/30 shadow-[inset_0_0_20px_rgba(251,191,36,0.05)] transition-transform hover:scale-[1.01] duration-300 flex flex-col sm:flex-row items-center justify-between gap-4 overflow-hidden">
                                    <div className="flex-1 text-center sm:text-left w-full overflow-hidden">
                                        <h3 className="text-amber-200/70 text-xs font-bold tracking-widest uppercase mb-2 flex items-center justify-center sm:justify-start gap-2">
                                            <span className="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span> Expected Hit Damage
                                        </h3>
                                        <div className="text-3xl sm:text-3xl lg:text-2xl xl:text-4xl font-black text-amber-400 drop-shadow-[0_0_15px_rgba(251,191,36,0.4)] tracking-tighter whitespace-nowrap" title="Rentang Minimum - Maksimum">
                                            {fmt(results.expectedHitMin)} <span className="text-amber-500/50 font-normal px-1">-</span> {fmt(results.expectedHitMax)}
                                        </div>
                                    </div>
                                    
                                    <div className="flex flex-col items-center sm:items-end justify-center gap-1 border-t sm:border-t-0 sm:border-l border-amber-500/20 pt-3 sm:pt-0 sm:pl-4 w-full sm:w-auto shrink-0">
                                        <span className="bg-amber-900/40 px-2 py-0.5 rounded border border-amber-700/50 flex items-center gap-1 shadow-inner whitespace-nowrap">
                                            <span className="text-[9px] uppercase tracking-wider text-amber-500">Avg:</span> 
                                            <strong className="text-amber-100 text-xs">{fmt(results.expectedHitDmg)}</strong>
                                        </span>
                                        <div className="text-[9px] text-amber-200/60 font-medium flex items-center justify-center gap-1.5 whitespace-nowrap mt-0.5">
                                            <span>Norm: <strong className="text-amber-100">{fmt(results.damageNormal)}</strong></span>
                                            {dmgType === 'Physical' && stats.critRate > 0 && (
                                                <>
                                                    <span className="text-amber-500/40">|</span>
                                                    <span className="text-rose-400">Crit: <strong className="text-rose-300">{fmt(results.damageCrit)}</strong></span>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* KARTU 2: DPS */}
                                <div className="bg-slate-950/60 rounded-2xl p-5 sm:p-6 border border-emerald-500/30 shadow-[inset_0_0_20px_rgba(52,211,153,0.05)] transition-transform hover:scale-[1.01] duration-300 flex flex-col sm:flex-row items-center justify-between gap-4 overflow-hidden">
                                    <div className="flex-1 text-center sm:text-left w-full overflow-hidden">
                                        <h3 className="text-emerald-200/70 text-xs font-bold tracking-widest uppercase mb-2 flex items-center justify-center sm:justify-start gap-2">
                                            <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Expected DPS
                                        </h3>
                                        <div className="text-3xl sm:text-3xl lg:text-2xl xl:text-4xl font-black text-emerald-400 drop-shadow-[0_0_15px_rgba(52,211,153,0.4)] tracking-tighter whitespace-nowrap" title="Rentang DPS Minimum - Maksimum">
                                            {fmt(results.expectedDpsMin)} <span className="text-emerald-500/50 font-normal px-1">-</span> {fmt(results.expectedDpsMax)}
                                        </div>
                                    </div>
                                    
                                    <div className="flex flex-col items-center sm:items-end justify-center gap-1 border-t sm:border-t-0 sm:border-l border-emerald-500/20 pt-3 sm:pt-0 sm:pl-4 w-full sm:w-auto shrink-0">
                                        <span className="bg-emerald-900/40 px-2 py-0.5 rounded border border-emerald-700/50 flex items-center gap-1 shadow-inner whitespace-nowrap">
                                            <span className="text-[9px] uppercase tracking-wider text-emerald-500">Avg:</span> 
                                            <strong className="text-emerald-100 text-xs">{fmt(results.expectedDps)}</strong>
                                        </span>
                                        <div className="text-[9px] text-emerald-200/60 font-medium flex items-center justify-center gap-1.5 whitespace-nowrap mt-0.5">
                                            <span>Norm: <strong className="text-emerald-100">{fmt(results.dpsNormal)}</strong></span>
                                            {dmgType === 'Physical' && stats.critRate > 0 && (
                                                <>
                                                    <span className="text-emerald-500/40">|</span>
                                                    <span className="text-teal-400">Crit: <strong className="text-teal-300">{fmt(results.dpsCrit)}</strong></span>
                                                </>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* KANAN: COMBAT DETAILS */}
                            <div className="lg:col-span-1 bg-slate-950/60 rounded-2xl p-5 border border-indigo-500/30 shadow-[inset_0_0_20px_rgba(99,102,241,0.05)] flex flex-col h-full">
                                <h3 className="text-indigo-200/80 text-sm font-bold tracking-widest uppercase mb-4 flex items-center gap-2 border-b border-indigo-500/20 pb-3">
                                    ⚙️ Combat Details
                                </h3>
                                <div className="flex flex-col gap-3 flex-grow justify-center">
                                    <div className="flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                                        <span className="text-slate-400 text-[11px] font-bold uppercase tracking-wider">Armor Penalty</span>
                                        <span className={`font-mono font-bold text-sm ${results.penMult < 1 ? "text-rose-400" : "text-emerald-400"}`} title="Pengurangan DMG karena DEF musuh tebal.">{Math.round(results.penMult * 100)}%</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                                        <span className="text-slate-400 text-[11px] font-bold uppercase tracking-wider">Delay/Atk</span>
                                        <div className="text-right">
                                            <span className="font-mono font-bold text-indigo-300 text-sm block">{fmtDec(results.delay)}s</span>
                                            <span className="text-slate-500 text-[10px] block font-mono">({fmtDec(results.hps)} hit/s)</span>
                                        </div>
                                    </div>
                                    <div className="flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                                        <span className="text-slate-400 text-[11px] font-bold uppercase tracking-wider">Sisa {dmgType === 'Physical' ? 'P.DEF' : 'M.DEF'}</span>
                                        <span className="font-mono font-bold text-slate-300 text-sm">{fmtDec(results.sisaDef)}</span>
                                    </div>
                                    {mode === 'PvP' && (
                                        <div className="flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                                            <span className="text-slate-400 text-[11px] font-bold uppercase tracking-wider">Mekanik PvP</span>
                                            <span className={`font-mono font-bold text-sm ${results.pvpMult > 1 ? "text-emerald-400" : results.pvpMult < 1 ? "text-rose-400" : "text-slate-300"}`}>
                                                {results.pvpMult > 1 ? '+' : ''}{Math.round((results.pvpMult - 1) * 100)}%
                                            </span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>


                    {/* ======================= */}
                    {/* BAGIAN INPUT BAWAH      */}
                    {/* ======================= */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        
                        {/* KIRI: STATS KARAKTER (Lebar 7 Kolom) */}
                        <div className="lg:col-span-7">
                            <div className="bg-slate-900/60 backdrop-blur-md rounded-2xl border border-amber-500/30 shadow-xl h-full">
                                <div className="bg-gradient-to-r from-amber-500/10 to-transparent p-4 border-b border-slate-700/50 flex items-center gap-3 rounded-t-2xl">
                                    <span className="text-xl">👑</span>
                                    <h2 className="text-lg font-bold text-slate-100 tracking-wide">Status Karakter</h2>
                                </div>
                                <div className="p-5 grid grid-cols-2 sm:grid-cols-3 gap-5">
                                    <InputBox label={dmgType === 'Physical' ? "PATK" : "MATK"} name="atk" val={stats.atk} fn={handleChange(setStats)} help="Angka dasar PATK/MATK di status detail karaktermu." />
                                    <InputBox label={dmgType === 'Physical' ? "Refine PATK" : "Refine MATK"} name="refineAtk" val={stats.refineAtk} fn={handleChange(setStats)} help="Angka Refine PATK/MATK dari statusmu." />
                                    
                                    <InputBox label={dmgType === 'Physical' ? "P.PEN (%)" : "M.PEN (%)"} name="pen" val={stats.pen} fn={handleChange(setStats)} help={`Abaikan jika belum ada di dalam game.`} />
                                    <InputBox label={dmgType === 'Physical' ? "Physical DMG (%)" : "Magic DMG (%)"} name="pdmg" val={stats.pdmg} fn={handleChange(setStats)} help="Persentase tambahan Physical atau Magic Damage." />
                                    
                                    {dmgType === 'Physical' && (
                                        <>
                                            <InputBox label="CRIT Rate (%)" name="critRate" val={stats.critRate} fn={handleChange(setStats)} hl="rose" help="Persentase peluang munculnya serangan Critical." />
                                            <InputBox label="CRIT DMG (%)" name="critDmg" val={stats.critDmg} fn={handleChange(setStats)} hl="rose" help="Bonus stat Critical Damage. (Base 150% RO sudah dihitung otomatis oleh sistem)" />
                                        </>
                                    )}

                                    <InputBox label="Dmg to Element (%)" name="dmgToEle" val={stats.dmgToEle} fn={handleChange(setStats)} help="Bonus damage vs elemen musuh (Misal: DMG vs Water)." />
                                    <InputBox label="Elemental Dmg (%)" name="eleDmg" val={stats.eleDmg} fn={handleChange(setStats)} help="Bonus damage dari elemen seranganmu (Misal: Fire DMG %)." />
                                    <InputBox label="Size Dmg (%)" name="sizeDmg" val={stats.sizeDmg} fn={handleChange(setStats)} help="Bonus damage vs ukuran monster. (Catatan: Pemain PvP selalu Medium)." />
                                    
                                    <InputBox label="Race Dmg (%)" name="raceDmg" val={stats.raceDmg} fn={handleChange(setStats)} help="Bonus damage vs ras monster. (Catatan: Pemain PvP selalu Demi-Human)." />
                                    {mode === 'PvE' && <InputBox label="Dmg to MVP/Mini (%)" name="mvpDmg" val={stats.mvpDmg} fn={handleChange(setStats)} help="Bonus damage saat melawan Boss MVP/Mini." />}
                                    <InputBox label="Ele Weakness (%)" name="eleWeakness" val={stats.eleWeakness} fn={handleChange(setStats)} help="Efektivitas elemen vs armor musuh. Netral=100. Counter=125/150/175/200." />
                                    
                                    {mode === 'PvE' ? 
                                        <InputBox label="PvE DMG (Flat)" name="pveDmg" val={stats.pveDmg} fn={handleChange(setStats)} hl="indigo" help="Angka status flat PvE DMG Bonus khusus melawan monster." /> : 
                                        <InputBox label="PvP DMG Bonus" name="pvpBonus" val={stats.pvpBonus} fn={handleChange(setStats)} hl="rose" help="Angka status PvP DMG Bonus untuk adu mekanik melawan pemain lain." />
                                    }
                                </div>
                            </div>
                        </div>

                        {/* KANAN: SKILL & TARGET (Lebar 5 Kolom tersusun vertikal) */}
                        <div className="lg:col-span-5 flex flex-col gap-6">
                            
                            {/* SKILL / AUTO-ATTACK */}
                            <div className="bg-slate-900/60 backdrop-blur-md rounded-2xl border border-cyan-500/30 shadow-xl">
                                <div className="bg-gradient-to-r from-cyan-500/10 to-transparent p-4 border-b border-slate-700/50 flex items-center justify-between gap-3 rounded-t-2xl">
                                    <div className="flex items-center gap-3">
                                        <span className="text-xl">⚡</span>
                                        <h2 className="text-lg font-bold text-slate-100 tracking-wide">Serangan</h2>
                                    </div>
                                    
                                    {/* TOGGLE SKILL VS AUTO-ATTACK */}
                                    <div className="flex bg-slate-950/80 p-1 rounded-lg border border-slate-700/50 shadow-inner">
                                        <button onClick={() => setIsAutoAttack(false)} className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${!isAutoAttack ? 'bg-cyan-600 text-white shadow-md' : 'text-slate-400 hover:text-cyan-300'}`}>Skill</button>
                                        <button onClick={() => setIsAutoAttack(true)} className={`px-3 py-1 text-xs font-bold rounded-md transition-all ${isAutoAttack ? 'bg-cyan-600 text-white shadow-md' : 'text-slate-400 hover:text-cyan-300'}`}>Auto-Attack</button>
                                    </div>
                                </div>
                                <div className="p-5 grid grid-cols-2 gap-4">
                                    <InputBox label="Multiplier (%)" name="multiplier" val={skill.multiplier} fn={handleChange(setSkill)} help="Isi 100% jika murni Auto-Attack tanpa skill pasif tambahan." />
                                    <InputBox label="Flat DMG" name="flat" val={skill.flat} fn={handleChange(setSkill)} help="Tambahan damage angka flat (Isi 0 untuk Auto-Attack murni)." />
                                    
                                    {/* INPUT CONDITIONAL: ASPD ATAU CD/DELAY */}
                                    {isAutoAttack ? (
                                        <div className="col-span-2 mt-2 pt-4 border-t border-slate-700/50">
                                            <InputBox label="Attack Speed (ASPD %)" name="aspd" val={stats.aspd} fn={handleChange(setStats)} hl="cyan" help="Total status ASPD % karaktermu. (Sistem menganggap 100% = 1 Hit per Detik)" />
                                        </div>
                                    ) : (
                                        <>
                                            <InputBox label="Cast Time (Detik)" name="castTime" val={skill.castTime} fn={handleChange(setSkill)} help="Sisa waktu casting skill yang tertera (Isi 0 jika instan)." />
                                            <InputBox label="Cooldown (Detik)" name="cooldown" val={skill.cooldown} fn={handleChange(setSkill)} help="Waktu Cooldown bawaan dari skill (wajib diisi)." />
                                            <InputBox label="Global CD (Detik)" name="globalCd" val={skill.globalCd} fn={handleChange(setSkill)} help="Waktu Global CD bawaan dari skill." />
                                            <InputBox label="Global CD Reduc (%)" name="gcdReduc" val={skill.gcdReduc} fn={handleChange(setSkill)} help="Status persentase pengurangan Global CD." />
                                        </>
                                    )}
                                </div>
                            </div>

                            {/* TARGET */}
                            <div className="bg-slate-900/60 backdrop-blur-md rounded-2xl border border-rose-500/30 shadow-xl flex-grow">
                                <div className="bg-gradient-to-r from-rose-500/10 to-transparent p-4 border-b border-slate-700/50 flex items-center gap-3 rounded-t-2xl">
                                    <span className="text-xl">🛡️</span>
                                    <h2 className="text-lg font-bold text-slate-100 tracking-wide">Status Target</h2>
                                </div>
                                <div className="p-5 flex flex-col gap-4">
                                    {mode === 'PvE' && (
                                        <div className="bg-slate-950/50 p-3 rounded-xl border border-slate-700/50">
                                            <label className="text-[11px] font-bold tracking-wider uppercase mb-2 flex items-center text-slate-400">
                                                📖 Pilih Database Monster
                                            </label>
                                            <select 
                                                value={selectedMonsterId}
                                                onChange={handleMonsterChange}
                                                className="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-slate-200 text-sm font-medium focus:border-amber-500 outline-none transition-colors mb-2 cursor-pointer shadow-inner"
                                            >
                                                {monsterDB.map(m => (
                                                    <option key={m.id} value={m.id}>{m.name}</option>
                                                ))}
                                            </select>
                                            
                                            {selectedMonsterId !== 'custom' && (() => {
                                                const mon = monsterDB.find(m => m.id === selectedMonsterId);
                                                if (!mon) return null;
                                                return (
                                                    <div className="grid grid-cols-2 gap-x-2 gap-y-1 text-[11px] text-slate-300 bg-slate-900/80 p-2.5 rounded border border-slate-700 shadow-inner mt-1">
                                                        <p><span className="text-slate-500">HP:</span> <span className="font-mono text-amber-200">{typeof mon.hp === 'number' ? mon.hp.toLocaleString('id-ID') : mon.hp}</span></p>
                                                        <p><span className="text-slate-500">Elemen:</span> <span className="font-bold text-indigo-300">{mon.element}</span></p>
                                                        <p><span className="text-slate-500">Ukuran:</span> <span className="font-bold text-indigo-300">{mon.size}</span></p>
                                                        <p><span className="text-slate-500">Ras:</span> <span className="font-bold text-indigo-300">{mon.race}</span></p>
                                                        <p><span className="text-slate-500">P.DEF:</span> <span className={`font-mono font-bold ${dmgType === 'Physical' ? 'text-amber-400' : 'text-emerald-400'}`}>{mon.def}</span></p>
                                                        <p><span className="text-slate-500">M.DEF:</span> <span className={`font-mono font-bold ${dmgType === 'Magic' ? 'text-amber-400' : 'text-emerald-400'}`}>{mon.mdef}</span></p>
                                                    </div>
                                                );
                                            })()}

                                            {/* TAMBAHAN: TOGGLE TIPE TARGET UNTUK MANUAL */}
                                            {selectedMonsterId === 'custom' && (
                                                <div className="mt-2 flex items-center justify-between bg-slate-900/80 px-3 py-2 rounded border border-slate-700 shadow-inner">
                                                    <span className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Tipe Target (Manual):</span>
                                                    <div className="flex gap-1 bg-slate-950 p-1 rounded-md border border-slate-700/50">
                                                        <button onClick={() => setTarget(p => ({...p, isBoss: false}))} className={`px-3 py-1 text-[10px] font-bold rounded transition-all ${!target.isBoss ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`}>Normal</button>
                                                        <button onClick={() => setTarget(p => ({...p, isBoss: true}))} className={`px-3 py-1 text-[10px] font-bold rounded transition-all ${target.isBoss ? 'bg-rose-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'}`}>Boss (MVP)</button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    <div className="grid grid-cols-2 gap-4">
                                        <InputBox label={dmgType === 'Physical' ? "P.DEF Musuh" : "M.DEF Musuh"} name="def" val={target.def} fn={handleTargetChange} help="Total nilai Defense atau Magic Defense target/musuh." />
                                        
                                        <InputBox label={dmgType === 'Physical' ? "Ignore DEF (Flat)" : "Ignore M.DEF (Flat)"} name="ignoreFlat" val={target.ignoreFlat} fn={handleTargetChange} help={`Status abaikan ${dmgType === 'Physical' ? 'DEF' : 'M.DEF'} milikmu berupa angka flat.`} />
                                        <InputBox label={dmgType === 'Physical' ? "Ignore DEF (%)" : "Ignore M.DEF (%)"} name="ignorePercent" val={target.ignorePercent} fn={handleTargetChange} help={`Status abaikan ${dmgType === 'Physical' ? 'DEF' : 'M.DEF'} milikmu berupa persentase.`} />
                                        
                                        {mode === 'PvP' && <InputBox label="PvP Reduc Musuh" name="pvpReduc" val={target.pvpReduc} fn={handleTargetChange} hl="rose" help="Nilai status PvP DMG Reduction (Flat) milik musuh." />}
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                    {/* ===== POP-UP LABYRINTH MAP ===== */}
                    {isMapOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm" onClick={() => setIsMapOpen(false)}>
                            <div className="relative bg-slate-900 border border-slate-700 rounded-2xl p-5 max-w-lg w-full shadow-2xl max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
                                
                                <button onClick={() => setIsMapOpen(false)} className="absolute top-4 right-5 text-2xl text-slate-400 hover:text-rose-500 transition-colors z-10">
                                    ✖
                                </button>
                                
                                <h3 className="text-xl font-bold text-amber-400 mb-4 flex items-center gap-2 pr-8">
                                    🗺️ Guide Labyrinth Forest 1F
                                </h3>
                                
                                <div className="flex justify-center bg-slate-950/50 rounded-xl border border-slate-700/50 p-2 mb-4">
                                    <img 
                                        src="https://media.discordapp.net/attachments/1126156157833216091/1169641470723145809/labyrinth_map.jpg" 
                                        alt="Labyrinth Map" 
                                        className="w-full max-h-[50vh] object-contain rounded-lg" 
                                    />
                                </div>
                                
                                <div className="p-4 bg-slate-950/50 rounded-xl border border-slate-700/50">
                                    <p className="text-sm font-bold text-emerald-400 mb-2">🚀 Rute Cepat ke 2F (Pilih Salah Satu):</p>
                                    <div className="flex flex-col gap-2">
                                        <p className="font-mono font-bold text-amber-200 bg-slate-800 px-3 py-1.5 rounded-lg w-fit text-sm">⭐ 1 ➔ 16 ➔ 3 ➔ 13 ➔ 8 ➔ 7</p>
                                        <p className="font-mono font-bold text-amber-200 bg-slate-800 px-3 py-1.5 rounded-lg w-fit text-sm">⭐ 1 ➔ 16 ➔ 6 ➔ 14 ➔ 8 ➔ 7</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* FOOTER */}
                    <div className="mt-16 text-center pb-8">
                        <div className="inline-flex flex-col items-center justify-center space-y-2">
                            <div className="h-px w-24 bg-gradient-to-r from-transparent via-amber-500/50 to-transparent"></div>
                            <p className="text-slate-400 text-xs font-medium tracking-widest uppercase">Designed & Developed by</p>
                            <h2 className="text-3xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-500 drop-shadow-[0_0_15px_rgba(251,191,36,0.3)]">
                                WILL.I.AM
                            </h2>
                            <div className="h-px w-24 bg-gradient-to-r from-transparent via-amber-500/50 to-transparent"></div>
                        </div>
                    </div>
                </div>
            );
        }

        // KOMPONEN INPUT BOX
        function InputBox({ label, name, val, fn, hl, help }) {
            const bCol = hl === 'indigo' ? 'border-indigo-500/50 focus:border-indigo-400' : hl === 'rose' ? 'border-rose-500/50 focus:border-rose-400' : hl === 'cyan' ? 'border-cyan-500/50 focus:border-cyan-400' : 'border-slate-700 focus:border-amber-500/70';
            const tCol = hl === 'indigo' ? 'text-indigo-300' : hl === 'rose' ? 'text-rose-300' : hl === 'cyan' ? 'text-cyan-300' : 'text-slate-400';
            const sCol = hl === 'indigo' ? '#818cf8' : hl === 'rose' ? '#fb7185' : hl === 'cyan' ? '#22d3ee' : '#fbbf24';
            
            return (
                <div className="flex flex-col relative group">
                    <label className={`relative text-[11px] font-bold tracking-wider uppercase mb-1.5 flex items-center cursor-help ${tCol}`}>
                        <span className="border-b border-dashed border-slate-500/70 pb-[1px] hover:text-slate-200 transition-colors w-fit">{label}</span>
                        {help && (
                            <div className="pointer-events-none absolute z-[60] bottom-full left-0 mb-2 w-56 p-3 bg-slate-800 border border-slate-600/80 rounded-lg shadow-[0_10px_25px_-5px_rgba(0,0,0,0.5)] text-[11px] text-slate-200 normal-case tracking-normal font-medium leading-relaxed opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                                {help}
                                <div className="absolute top-full left-4 w-2 h-2 bg-slate-800 border-b border-r border-slate-600/80 transform rotate-45 -mt-1"></div>
                            </div>
                        )}
                    </label>
                    <div className="relative">
                        <input type="number" name={name} value={val} onChange={fn} className={`w-full bg-slate-950/80 border ${bCol} rounded-lg px-3 py-2 text-slate-100 text-sm font-medium outline-none transition-all shadow-inner focus:shadow-[0_0_10px_rgba(0,0,0,0.5)]`} />
                        <div className="absolute inset-0 rounded-lg pointer-events-none opacity-0 group-focus-within:opacity-100 transition-opacity" style={{ boxShadow: `inset 0 0 0 1px ${sCol}` }}></div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ROOCCalculator />);
    </script>
</body>
</html>
