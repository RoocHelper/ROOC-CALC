<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Damage ROOC - Will.I.Am</title>
    <!-- Tailwind CSS untuk Styling (Otomatis load dari internet) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel untuk Logic Aplikasi -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; 
            /* Menambahkan Background Gambar RO dengan efek gradien gelap agar teks tetap terbaca */
            background-image: linear-gradient(to bottom, rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.95)), url('https://wallpapercave.com/wp/wp10404077.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        /* Kustomisasi Scrollbar agar keren */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="text-slate-200 antialiased selection:bg-amber-500/30 selection:text-amber-200 min-h-screen relative overflow-x-hidden">
    
    <!-- Background Ornaments -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-indigo-600/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-amber-600/10 blur-[120px] rounded-full"></div>
    </div>

    <!-- Tempat Aplikasi Berjalan -->
    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function ROOCCalculator() {
            const [mode, setMode] = useState('PvE');

            // --- STATE DATA ---
            const [stats, setStats] = useState({
                atk: 6334, refineAtk: 639, pdmg: 83.09, dmgToEle: 0, skillDmgInc: 0, 
                eleDmg: 0, sizeDmg: 20, raceDmg: 5, mvpDmg: 0, eleWeakness: 100, 
                pveDmg: 683, pvpBonus: 500
            });

            const [skill, setSkill] = useState({
                multiplier: 710, flat: 540, castTime: 0, cooldown: 0.5, globalCd: 1.0, gcdReduc: 12
            });

            const [target, setTarget] = useState({
                def: 500, ignoreFlat: 971, ignorePercent: 0, pvpReduc: 200
            });

            const [results, setResults] = useState({
                sisaDef: 0, penMult: 1, pvpDiff: 0, pvpMult: 1, damage: 0, damageMin: 0, damageMax: 0, delay: 0, hps: 0, dps: 0, dpsMin: 0, dpsMax: 0
            });

            // --- HANDLERS ---
            const handleChange = (setter) => (e) => {
                const { name, value } = e.target;
                setter(prev => ({ ...prev, [name]: parseFloat(value) || 0 }));
            };

            const handleModeChange = (newMode) => {
                setMode(newMode);
                if (newMode === 'PvP') {
                    setStats(prev => ({ ...prev, raceDmg: 5, sizeDmg: 20, eleWeakness: 100, mvpDmg: 0 }));
                }
            };

            // --- LOGIKA KALKULASI ---
            useEffect(() => {
                let sisaDef = Math.max(0, (target.def - target.ignoreFlat) * (1 - target.ignorePercent / 100));
                let penMult = 1;
                if (sisaDef >= 360) penMult = 0.35;
                else if (sisaDef >= 240) penMult = 0.4;
                else if (sisaDef >= 120) penMult = 0.5;
                else if (sisaDef >= 60) penMult = 0.7;
                else if (sisaDef >= 30) penMult = 0.9;

                let baseDmg = (stats.atk * (skill.multiplier / 100)) + stats.refineAtk + skill.flat;
                let statMult = (1 + (stats.pdmg / 100) + (stats.dmgToEle / 100)) *
                               (1 + (stats.skillDmgInc / 100)) *
                               (1 + (stats.eleDmg / 100)) *
                               (1 + (stats.sizeDmg / 100)) *
                               (1 + (stats.raceDmg / 100)) *
                               (1 + (stats.mvpDmg / 100)) *
                               (stats.eleWeakness / 100);

                let finalPvE = 1, finalPvP = 1, pvpDiff = 0;

                if (mode === 'PvE') {
                    finalPvE = 1 + (stats.pveDmg * 0.00012);
                } else {
                    pvpDiff = stats.pvpBonus - target.pvpReduc;
                    let absDiff = Math.abs(pvpDiff);
                    let pvpMod = 0;
                    if (absDiff >= 2100) pvpMod = 0.18;
                    else if (absDiff >= 1800) pvpMod = 0.15;
                    else if (absDiff >= 1500) pvpMod = 0.12;
                    else if (absDiff >= 1200) pvpMod = 0.10;
                    else if (absDiff >= 900) pvpMod = 0.08;
                    else if (absDiff >= 600) pvpMod = 0.06;
                    else if (absDiff >= 300) pvpMod = 0.04;
                    finalPvP = 1 + (pvpMod * Math.sign(pvpDiff));
                }

                let damagePerHit = baseDmg * statMult * finalPvE * finalPvP * penMult;
                let damageMin = damagePerHit * 0.9;
                let damageMax = damagePerHit * 1.1;

                let gcdActual = skill.globalCd * (1 - (skill.gcdReduc / 100));
                let totalDelay = skill.castTime + Math.max(skill.cooldown, gcdActual);
                let hps = totalDelay > 0 ? 1 / totalDelay : 0;
                let dps = damagePerHit * hps;
                let dpsMin = dps * 0.9;
                let dpsMax = dps * 1.1;

                setResults({ sisaDef, penMult, pvpDiff, pvpMult: finalPvP, damage: damagePerHit, damageMin, damageMax, delay: totalDelay, hps, dps, dpsMin, dpsMax });
            }, [stats, skill, target, mode]);

            const fmt = (num) => Math.round(num).toLocaleString('id-ID');
            const fmtDec = (num) => num.toFixed(2);

            return (
                <div className="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-slate-900/80 p-6 rounded-2xl border border-slate-700/50 backdrop-blur-md shadow-2xl">
                        <div className="flex items-center gap-4">
                            <div className="text-4xl drop-shadow-[0_0_15px_rgba(251,191,36,0.5)]">✨</div>
                            <div>
                                <h1 className="text-2xl sm:text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-amber-200 via-amber-400 to-yellow-600 tracking-wide">
                                    ROOC DAMAGE SIMULATOR
                                </h1>
                                <p className="text-indigo-300 font-medium text-xs sm:text-sm mt-1 tracking-wider uppercase">Theorycrafting Tool</p>
                            </div>
                        </div>
                        
                        <div className="flex bg-slate-950/80 p-1.5 rounded-xl border border-slate-700/50 shadow-inner">
                            <button onClick={() => handleModeChange('PvE')} className={`flex items-center gap-2 px-6 py-2.5 rounded-lg font-bold transition-all duration-300 ${mode === 'PvE' ? 'bg-gradient-to-r from-indigo-600 to-blue-700 text-white shadow-[0_0_15px_rgba(99,102,241,0.5)]' : 'text-slate-400 hover:text-indigo-300 hover:bg-slate-800'}`}>
                                🎯 PvE Mode
                            </button>
                            <button onClick={() => handleModeChange('PvP')} className={`flex items-center gap-2 px-6 py-2.5 rounded-lg font-bold transition-all duration-300 ${mode === 'PvP' ? 'bg-gradient-to-r from-rose-600 to-red-700 text-white shadow-[0_0_15px_rgba(225,29,72,0.5)]' : 'text-slate-400 hover:text-rose-300 hover:bg-slate-800'}`}>
                                ⚔️ PvP Mode
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* INPUTS */}
                        <div className="lg:col-span-8 space-y-6">
                            
                            {/* Stat Karakter */}
                            <div className="bg-slate-900/60 backdrop-blur-md rounded-2xl border border-amber-500/30 shadow-xl">
                                <div className="bg-gradient-to-r from-amber-500/10 to-transparent p-4 border-b border-slate-700/50 flex items-center gap-3 rounded-t-2xl">
                                    <span className="text-xl">👑</span>
                                    <h2 className="text-lg font-bold text-slate-100 tracking-wide">Status Karakter</h2>
                                </div>
                                <div className="p-5 grid grid-cols-2 sm:grid-cols-3 gap-4">
                                    <InputBox label="PATK / MATK" name="atk" val={stats.atk} fn={handleChange(setStats)} help="Angka dasar PATK/MATK di status detail karaktermu." />
                                    <InputBox label="Refine ATK" name="refineAtk" val={stats.refineAtk} fn={handleChange(setStats)} help="Angka Refine PATK/MATK dari statusmu." />
                                    <InputBox label="P/M.DMG (%)" name="pdmg" val={stats.pdmg} fn={handleChange(setStats)} help="Persentase tambahan Physical atau Magic Damage." />
                                    <InputBox label="Dmg to Element (%)" name="dmgToEle" val={stats.dmgToEle} fn={handleChange(setStats)} help="Bonus damage vs elemen musuh (Misal: DMG vs Water)." />
                                    <InputBox label="Skill Dmg Inc (%)" name="skillDmgInc" val={stats.skillDmgInc} fn={handleChange(setStats)} help="Peningkatan damage khusus untuk penggunaan skill." />
                                    <InputBox label="Elemental Dmg (%)" name="eleDmg" val={stats.eleDmg} fn={handleChange(setStats)} help="Bonus damage dari elemen seranganmu (Misal: Fire DMG %)." />
                                    <InputBox label="Size Dmg (%)" name="sizeDmg" val={stats.sizeDmg} fn={handleChange(setStats)} help="Bonus damage vs ukuran monster. (Catatan: Pemain PvP selalu Medium)." />
                                    <InputBox label="Race Dmg (%)" name="raceDmg" val={stats.raceDmg} fn={handleChange(setStats)} help="Bonus damage vs ras monster. (Catatan: Pemain PvP selalu Demi-Human)." />
                                    {mode === 'PvE' && <InputBox label="Dmg to MVP/Mini (%)" name="mvpDmg" val={stats.mvpDmg} fn={handleChange(setStats)} help="Bonus damage saat melawan Boss MVP/Mini." />}
                                    <InputBox label="Ele Weakness (%)" name="eleWeakness" val={stats.eleWeakness} fn={handleChange(setStats)} help="Efektivitas elemen vs armor musuh. Netral=100. Counter=125/150/175/200." />
                                    {mode === 'PvE' ? 
                                        <InputBox label="PvE DMG (Flat)" name="pveDmg" val={stats.pveDmg} fn={handleChange(setStats)} hl="indigo" help="Angka status flat PvE DMG Bonus khusus melawan monster." /> : 
                                        <InputBox label="PvP DMG Bonus" name="pvpBonus" val={stats.pvpBonus} fn={handleChange(setStats)} hl="rose" help="Angka status PvP DMG Bonus untuk adu mekanik melawan pemain lain." />
                                    }
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {/* Skill */}
                                <div className="bg-slate-900/60 backdrop-blur-md rounded-2xl border border-cyan-500/30 shadow-xl">
                                    <div className="bg-gradient-to-r from-cyan-500/10 to-transparent p-4 border-b border-slate-700/50 flex items-center gap-3 rounded-t-2xl">
                                        <span className="text-xl">⚡</span>
                                        <h2 className="text-lg font-bold text-slate-100 tracking-wide">Skill & Delay</h2>
                                    </div>
                                    <div className="p-5 grid grid-cols-2 gap-4">
                                        <InputBox label="Skill Multiplier (%)" name="multiplier" val={skill.multiplier} fn={handleChange(setSkill)} help="Persentase kekuatan dasar skill (Contoh: Lion Roar = 710%)." />
                                        <InputBox label="Skill Flat DMG" name="flat" val={skill.flat} fn={handleChange(setSkill)} help="Tambahan damage angka flat yang ada di deskripsi skill." />
                                        <InputBox label="Cast Time (Detik)" name="castTime" val={skill.castTime} fn={handleChange(setSkill)} help="Sisa waktu casting skill yang tertera (Isi 0 jika instan)." />
                                        <InputBox label="Cooldown (Detik)" name="cooldown" val={skill.cooldown} fn={handleChange(setSkill)} help="Waktu Cooldown bawaan dari skill (wajib diisi)." />
                                        <InputBox label="Global CD (Detik)" name="globalCd" val={skill.globalCd} fn={handleChange(setSkill)} help="Waktu Global CD bawaan dari skill (wajib diisi)." />
                                        <InputBox label="Global CD Reduc (%)" name="gcdReduc" val={skill.gcdReduc} fn={handleChange(setSkill)} help="Status persentase pengurangan Global CD milik karaktermu." />
                                    </div>
                                </div>

                                {/* Target */}
                                <div className="bg-slate-900/60 backdrop-blur-md rounded-2xl border border-rose-500/30 shadow-xl">
                                    <div className="bg-gradient-to-r from-rose-500/10 to-transparent p-4 border-b border-slate-700/50 flex items-center gap-3 rounded-t-2xl">
                                        <span className="text-xl">🛡️</span>
                                        <h2 className="text-lg font-bold text-slate-100 tracking-wide">Status Target</h2>
                                    </div>
                                    <div className="p-5 grid grid-cols-2 gap-4">
                                        <InputBox label="P/M.DEF Musuh" name="def" val={target.def} fn={handleChange(setTarget)} help="Total nilai Defense atau Magic Defense target/musuh." />
                                        <InputBox label="Ignore DEF (Flat)" name="ignoreFlat" val={target.ignoreFlat} fn={handleChange(setTarget)} help="Status abaikan DEF milikmu berupa angka flat." />
                                        <InputBox label="Ignore DEF (%)" name="ignorePercent" val={target.ignorePercent} fn={handleChange(setTarget)} help="Status abaikan DEF milikmu berupa persentase." />
                                        {mode === 'PvP' && <InputBox label="PvP Reduc Musuh" name="pvpReduc" val={target.pvpReduc} fn={handleChange(setTarget)} hl="rose" help="Nilai status PvP DMG Reduction (Flat) milik musuh." />}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* RESULTS */}
                        <div className="lg:col-span-4">
                            <div className="bg-slate-900/80 rounded-2xl border border-slate-700/50 shadow-2xl backdrop-blur-xl sticky top-6 overflow-hidden">
                                <div className={`p-5 ${mode === 'PvE' ? 'bg-gradient-to-r from-indigo-900/60 to-blue-900/60' : 'bg-gradient-to-r from-rose-900/60 to-red-900/60'} border-b border-slate-700/50`}>
                                    <h2 className="text-xl font-bold flex items-center gap-2 text-white drop-shadow-md">
                                        📊 Estimasi Output
                                    </h2>
                                </div>
                                
                                <div className="p-6 space-y-6">
                                    {/* Hit */}
                                    <div className="relative group">
                                        <div className="absolute inset-0 bg-gradient-to-r from-amber-500/20 to-orange-500/20 rounded-xl blur transition group-hover:opacity-100 opacity-70"></div>
                                        <div className="relative bg-slate-950/80 rounded-xl p-5 border border-amber-500/30">
                                            <p className="text-amber-200/60 text-xs font-bold tracking-widest uppercase mb-2 flex items-center gap-2">⚔️ Damage Per Hit Range</p>
                                            <p className="text-2xl sm:text-3xl xl:text-4xl font-black text-amber-400 tracking-tighter drop-shadow-[0_2px_10px_rgba(251,191,36,0.3)]">
                                                {fmt(results.damageMin)} <span className="text-amber-500/50 font-normal px-1">-</span> {fmt(results.damageMax)}
                                            </p>
                                            <div className="mt-3 pt-3 border-t border-amber-500/20 flex items-center">
                                                <p className="text-sm text-amber-200/80">Rata-rata: <span className="font-mono font-bold text-amber-100">{fmt(results.damage)}</span></p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* DPS */}
                                    <div className="relative group">
                                        <div className="absolute inset-0 bg-gradient-to-r from-emerald-500/20 to-teal-500/20 rounded-xl blur transition group-hover:opacity-100 opacity-70"></div>
                                        <div className="relative bg-slate-950/80 rounded-xl p-5 border border-emerald-500/30">
                                            <p className="text-emerald-200/60 text-xs font-bold tracking-widest uppercase mb-2 flex items-center gap-2">⏱️ DPS Range (Damage/Sec)</p>
                                            <p className="text-2xl sm:text-3xl xl:text-4xl font-black text-emerald-400 tracking-tighter drop-shadow-[0_2px_10px_rgba(52,211,153,0.3)]">
                                                {fmt(results.dpsMin)} <span className="text-emerald-500/50 font-normal px-1">-</span> {fmt(results.dpsMax)}
                                            </p>
                                            <div className="mt-3 pt-3 border-t border-emerald-500/20 flex items-center">
                                                <p className="text-sm text-emerald-200/80">Rata-rata: <span className="font-mono font-bold text-emerald-100">{fmt(results.dps)}</span></p>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Detail */}
                                    <div className="space-y-4 pt-6 border-t border-slate-700/50 text-sm">
                                        <h3 className="text-slate-400 font-semibold text-xs tracking-widest uppercase flex items-center gap-2 mb-4">⚙️ Detail Kalkulasi</h3>
                                        <ResultRow label="Delay Per Hit" val={`${fmtDec(results.delay)}s`} />
                                        <ResultRow label="Serangan / Detik" val={`${fmtDec(results.hps)} hit/s`} />
                                        <ResultRow label="Sisa DEF Musuh" val={fmtDec(results.sisaDef)} />
                                        <ResultRow label="Penetrasi Armor" val={`${Math.round(results.penMult * 100)}%`} col={results.penMult < 1 ? "text-rose-400" : "text-emerald-400"} />
                                        {mode === 'PvP' && (
                                            <>
                                                <ResultRow label="Selisih PvP Stat" val={results.pvpDiff} />
                                                <ResultRow label="Efek Mekanik PvP" val={`${results.pvpMult > 1 ? '+' : ''}${Math.round((results.pvpMult - 1) * 100)}% DMG`} col={results.pvpMult > 1 ? "text-emerald-400" : results.pvpMult < 1 ? "text-rose-400" : "text-slate-300"} />
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* FOOTER */}
                    <div className="mt-16 text-center pb-8">
                        <div className="inline-flex flex-col items-center justify-center space-y-2">
                            <div className="h-px w-24 bg-gradient-to-r from-transparent via-amber-500/50 to-transparent"></div>
                            <p className="text-slate-400 text-xs font-medium tracking-widest uppercase">Designed & Developed by</p>
                            <h2 className="text-3xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-500 drop-shadow-[0_0_15px_rgba(251,191,36,0.3)]">
                                WILL.I.AM
                            </h2>
                            <div className="h-px w-24 bg-gradient-to-r from-transparent via-amber-500/50 to-transparent"></div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- SUB COMPONENTS ---
        function InputBox({ label, name, val, fn, hl, help }) {
            const bCol = hl === 'indigo' ? 'border-indigo-500/50 focus:border-indigo-400' : hl === 'rose' ? 'border-rose-500/50 focus:border-rose-400' : 'border-slate-700 focus:border-amber-500/70';
            const tCol = hl === 'indigo' ? 'text-indigo-300' : hl === 'rose' ? 'text-rose-300' : 'text-slate-400';
            const sCol = hl === 'indigo' ? '#818cf8' : hl === 'rose' ? '#fb7185' : '#fbbf24';
            
            return (
                <div className="flex flex-col relative group">
                    <label className={`relative text-[11px] font-bold tracking-wider uppercase mb-1.5 flex items-center cursor-help ${tCol}`}>
                        <span className="border-b border-dashed border-slate-500/70 pb-[1px] hover:text-slate-200 transition-colors w-fit">{label}</span>
                        {help && (
                            <div className="pointer-events-none absolute z-[60] bottom-full left-0 mb-2 w-56 p-3 bg-slate-800 border border-slate-600/80 rounded-lg shadow-[0_10px_25px_-5px_rgba(0,0,0,0.5)] text-[11px] text-slate-200 normal-case tracking-normal font-medium leading-relaxed opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                                {help}
                                <div className="absolute top-full left-4 w-2 h-2 bg-slate-800 border-b border-r border-slate-600/80 transform rotate-45 -mt-1"></div>
                            </div>
                        )}
                    </label>
                    <div className="relative">
                        <input type="number" name={name} value={val} onChange={fn} className={`w-full bg-slate-950/80 border ${bCol} rounded-lg px-3 py-2 text-slate-100 text-sm font-medium outline-none transition-all shadow-inner focus:shadow-[0_0_10px_rgba(0,0,0,0.5)]`} />
                        <div className="absolute inset-0 rounded-lg pointer-events-none opacity-0 group-focus-within:opacity-100 transition-opacity" style={{ boxShadow: `inset 0 0 0 1px ${sCol}` }}></div>
                    </div>
                </div>
            );
        }

        function ResultRow({ label, val, col = "text-slate-200" }) {
            return (
                <div className="flex justify-between items-center py-1 group border-b border-slate-800/50 last:border-0 pb-2">
                    <span className="text-slate-400 group-hover:text-slate-300 transition-colors">{label}</span>
                    <span className={`font-mono font-bold text-base bg-slate-950/50 px-2 py-0.5 rounded border border-slate-800 ${col}`}>{val}</span>
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ROOCCalculator />);
    </script>
</body>
</html>
